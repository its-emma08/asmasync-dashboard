<div class="report-container p-6 flex justify-center">
    <mat-card class="w-full max-w-2xl">
        <mat-card-header class="mb-4 border-b pb-4">
            <mat-icon mat-card-avatar class="scale-150 ml-2 mt-2 text-blue-600">picture_as_pdf</mat-icon>
            <mat-card-title class="ml-4 text-2xl">Generador de Reportes</mat-card-title>
            <mat-card-subtitle class="ml-4">Descargue informes detallados en formato PDF</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <form [formGroup]="reportForm" class="flex flex-col gap-4 mt-4">

                <mat-form-field appearance="outline">
                    <mat-label>Tipo de Reporte</mat-label>
                    <mat-select formControlName="reportType">
                        <mat-option value="individual">Reporte Individual de Paciente</mat-option>
                        <mat-option value="weekly">Reporte Semanal de Actividad</mat-option>
                        <!-- <mat-option value="adherence">Reporte de Adherencia</mat-option> -->
                    </mat-select>
                </mat-form-field>

                <div *ngIf="reportForm.get('reportType')?.value === 'individual'">
                    <mat-form-field appearance="outline" class="w-full">
                        <mat-label>Seleccionar Paciente</mat-label>
                        <mat-select formControlName="patientId">
                            <mat-option *ngFor="let p of patients" [value]="p.id">
                                {{p.fullName}} (ID: {{p.id}})
                            </mat-option>
                        </mat-select>
                        <mat-error *ngIf="reportForm.get('patientId')?.hasError('required')">
                            Debe seleccionar un paciente
                        </mat-error>
                    </mat-form-field>
                </div>

                <div class="flex gap-4">
                    <mat-form-field appearance="outline" class="w-full">
                        <mat-label>Fecha Inicio</mat-label>
                        <input matInput [matDatepicker]="startPicker" formControlName="dateRangeStart">
                        <mat-datepicker-toggle matIconSuffix [for]="startPicker"></mat-datepicker-toggle>
                        <mat-datepicker #startPicker></mat-datepicker>
                    </mat-form-field>

                    <mat-form-field appearance="outline" class="w-full">
                        <mat-label>Fecha Fin</mat-label>
                        <input matInput [matDatepicker]="endPicker" formControlName="dateRangeEnd">
                        <mat-datepicker-toggle matIconSuffix [for]="endPicker"></mat-datepicker-toggle>
                        <mat-datepicker #endPicker></mat-datepicker>
                    </mat-form-field>
                </div>

                <div class="actions mt-6 flex justify-end">
                    <button mat-raised-button color="primary" class="px-8 py-2" (click)="generateReport()"
                        [disabled]="reportForm.invalid || generating">
                        <div class="flex items-center gap-2">
                            <mat-spinner *ngIf="generating" diameter="20" color="accent"></mat-spinner>
                            <mat-icon *ngIf="!generating">download</mat-icon>
                            <span>{{ generating ? 'Generando...' : 'Descargar PDF' }}</span>
                        </div>
                    </button>
                </div>

            </form>
        </mat-card-content>
    </mat-card>
</div>
