<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title class="text-center w-full mb-4">
        <h1 class="text-2xl font-bold text-primary">AsmaSync</h1>
        <p class="text-sm text-gray-500">Monitoreo de Pacientes Asmáticos</p>
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
        
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Correo Electrónico</mat-label>
          <input matInput formControlName="email" type="email" placeholder="enfermeria@hospital.com">
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">
            El correo es obligatorio
          </mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">
            Ingresa un correo válido
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Contraseña</mat-label>
          <input matInput formControlName="password" type="password">
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
            La contraseña es obligatoria
          </mat-error>
          <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">
            Mínimo 8 caracteres
          </mat-error>
        </mat-form-field>

        <div class="flex justify-center my-2" *ngIf="isLoading">
          <mat-spinner diameter="30"></mat-spinner>
        </div>

        <button mat-flat-button color="primary" type="submit" 
                [disabled]="loginForm.invalid || isLoading" class="w-full py-6 text-lg">
          Iniciar Sesión
        </button>

        <div class="text-center mt-2">
            <a href="#" class="text-sm text-primary hover:underline" (click)="$event.preventDefault()">¿Olvidaste tu contraseña?</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
