<div
    class="min-h-screen w-full flex items-center justify-center p-4 bg-gradient-to-br from-teal-700 to-cyan-800 relative overflow-hidden">

    <!-- Background Shapes -->
    <div
        class="absolute top-[-20%] right-[-10%] w-[800px] h-[800px] bg-cyan-500/20 rounded-full blur-3xl animate-pulse">
    </div>
    <div class="absolute bottom-[-20%] left-[-10%] w-[600px] h-[600px] bg-teal-400/20 rounded-full blur-3xl"></div>

    <div
        class="w-full max-w-md bg-white/95 backdrop-blur-xl rounded-[2.5rem] shadow-2xl p-8 md:p-12 relative animate-fade-in-up">

        <!-- Back Button -->
        <a routerLink="/login" class="absolute top-6 left-6 text-slate-400 hover:text-brand-cyan transition-colors">
            <mat-icon>arrow_back</mat-icon>
        </a>

        <div class="text-center mb-8 mt-4">
            <div
                class="w-16 h-16 bg-gradient-to-br from-brand-cyan to-brand-green rounded-2xl flex items-center justify-center shadow-lg text-white mx-auto mb-6">
                <mat-icon class="scale-150">lock_reset</mat-icon>
            </div>
            <h3 class="text-2xl font-bold text-slate-900 mb-2">Recuperar Contraseña</h3>
            <p class="text-slate-500 text-sm">Ingresa tu correo asociado y te enviaremos un enlace de recuperación.</p>
        </div>

        <div *ngIf="!emailSent; else successState">
            <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-5" appFocusInvalidInput>
                <!-- Email -->
                <div class="space-y-1">
                    <label class="text-sm font-bold text-slate-700 ml-1">Correo Electrónico</label>
                    <div class="relative">
                        <mat-icon
                            class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 scale-90">email</mat-icon>
                        <input type="email" formControlName="email"
                            class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-brand-cyan/20 focus:border-brand-cyan outline-none transition-all font-medium text-slate-700 placeholder-slate-400"
                            placeholder="nombre@ejemplo.com">
                    </div>
                    <mat-error *ngIf="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched"
                        class="text-xs ml-1">
                        Ingresa un correo válido
                    </mat-error>
                </div>

                <!-- Submit Button -->
                <button mat-flat-button color="primary"
                    class="!py-6 !rounded-2xl !text-lg !font-bold shadow-lg shadow-brand-cyan/30 mt-2 transition-transform hover:scale-[1.02]"
                    [disabled]="forgotForm.invalid || isLoading">
                    <div class="flex items-center gap-2 justify-center">
                        <mat-spinner diameter="20" *ngIf="isLoading" class="mr-2 text-white"></mat-spinner>
                        <span>{{ isLoading ? 'Enviando...' : 'Enviar Enlace' }}</span>
                    </div>
                </button>
            </form>
        </div>

        <!-- Success State -->
        <ng-template #successState>
            <div class="text-center animate-fade-in">
                <div
                    class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <mat-icon class="scale-125">mark_email_read</mat-icon>
                </div>
                <h4 class="font-bold text-slate-800 text-lg mb-2">¡Correo Enviado!</h4>
                <p class="text-slate-500 text-sm mb-6">Hemos enviado las instrucciones a tu correo electrónico. Revisa
                    tu bandeja de entrada.</p>

                <a routerLink="/login" mat-stroked-button color="primary" class="!rounded-xl !w-full !py-6 !font-bold">
                    Volver al Login
                </a>
            </div>
        </ng-template>

    </div>
</div>
