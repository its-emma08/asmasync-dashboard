<header class="flex items-center justify-between px-1 py-2 mb-6 gap-4">

    <!-- Desktop Sidebar Toggle -->

    <!-- Left: Breadcrumbs -->
    <div class="flex-shrink-0 flex-1 md:flex-none">
        <div class="text-xs font-medium text-slate-400 mb-0 flex items-center gap-2">
            <ng-container *ngFor="let crumb of breadcrumbs$ | async; let last = last">
                <a *ngIf="!last" [routerLink]="crumb.url"
                    class="hover:text-cyan-700 transition-colors cursor-pointer decoration-0">{{ crumb.label }}</a>
                <span *ngIf="last" class="text-slate-600">{{ crumb.label }}</span>
                <span *ngIf="!last" class="text-slate-300">/</span>
            </ng-container>
        </div>
    </div>

    <!-- Right: Actions Toolbar -->
    <div class="flex items-center gap-3 dashboard-header glass-card-premium p-2 rounded-2xl border shadow-sm ml-auto backdrop-blur-md bg-white/80 dark:bg-slate-900/80 border-slate-200/60 dark:border-slate-700 dark:shadow-none transition-colors duration-300">

        <!-- Search Pill -->
        <div class="search-pill apple-search-bar hidden md:flex">
            <mat-icon class="search-icon">search</mat-icon>
            <input type="text" placeholder="Buscar paciente o reporte..." [(ngModel)]="searchTerm" (ngModelChange)="onSearch($event)"
                class="search-input">

            <!-- Clear Button -->
            <button *ngIf="searchTerm" (click)="clearSearch()"
                class="ml-1 text-slate-400 hover:text-red-500 transition-colors">
                <mat-icon class="scale-75 text-[16px] w-[16px] h-[16px] leading-[16px]">close</mat-icon>
            </button>
        </div>

        <!-- Date Display -->
        <div class="hidden lg:flex items-center gap-2 text-slate-500 text-xs font-semibold px-3 capitalize">
            <mat-icon class="scale-75">calendar_today</mat-icon>
            <span>{{ currentDate | date:'fullDate':'':'es-ES' }}</span>
        </div>

        <!-- Divider -->
        <div class="hidden lg:block w-px h-8 bg-slate-200/60"></div>

        <!-- Theme Toggle -->
        <button mat-icon-button class="nav-btn" (click)="toggleTheme()"
            [title]="isDarkMode ? 'Modo Claro' : 'Modo Oscuro'">
            <mat-icon>{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</mat-icon>
        </button>

        <!-- Notifications -->
        <button mat-icon-button class="nav-btn relative"
            [matMenuTriggerFor]="notificationsMenu">
            <div class="icon-badge-wrapper">
                <mat-icon class="scale-90">notifications</mat-icon>
                <div *ngIf="(unreadCount$ | async) as count" class="badge-dot"></div>
            </div>
        </button>

        <!-- Divider -->
        <div class="w-px h-8 bg-slate-200/60"></div>

        <!-- User Profile Trigger -->
        <div [matMenuTriggerFor]="userMenu" class="profile-pill">
            <div class="profile-info text-right hidden md:block">
                <p class="name">{{ doctorName }}</p>
                <p class="role">{{ doctorSpecialty }}</p>
            </div>
            <!-- Profile Avatar (Standardized) -->
            <div class="profile-avatar shadow-apple">
                {{ doctorInitials }}
            </div>
        </div>

    </div>

    <!-- User Menu -->
    <mat-menu #userMenu="matMenu" class="rounded-xl">
        <button mat-menu-item (click)="goToProfile()">
            <mat-icon>person</mat-icon> Mi Perfil
        </button>
        <button mat-menu-item (click)="goToSettings()">
            <mat-icon>settings</mat-icon> Configuración
        </button>
        <button mat-menu-item (click)="goToHelp()">
            <mat-icon>help</mat-icon> Ayuda
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()" class="!text-red-500">
            <mat-icon class="!text-red-500">logout</mat-icon> Cerrar Sesión
        </button>
    </mat-menu>

    <!-- Notifications Menu -->
    <mat-menu #notificationsMenu="matMenu" class="rounded-2xl w-80 max-h-[400px] overflow-hidden">
        <div
            class="px-4 py-3 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center bg-white dark:bg-slate-800 sticky top-0 z-10 transition-colors">
            <span class="font-bold text-sm text-slate-800 dark:text-white">Notificaciones</span>
            <button mat-button class="text-[10px] !h-6 !px-2 text-brand-cyan" (click)="markAllRead($event)">
                Marcar leídas
            </button>
        </div>

        <div class="max-h-[300px] overflow-y-auto">
            <button mat-menu-item *ngFor="let alert of notifications$ | async"
                class="!h-auto py-3 border-b border-slate-50 dark:border-slate-700/50 last:border-0 relative transition-colors"
                [ngClass]="{'bg-blue-50 dark:bg-slate-700/50': !alert.is_viewed, 'hover:bg-slate-50 dark:hover:bg-slate-700': true}"
                (click)="handleNotificationClick(alert)">

                <div class="flex items-start gap-3 w-full">
                    <!-- Icon -->
                    <div class="flex-shrink-0 mt-1" [ngClass]="{
                      'text-red-500 bg-red-50': alert.alert_type === 'critical',
                      'text-amber-500 bg-amber-50': alert.alert_type === 'moderate',
                      'text-blue-500 bg-blue-50': alert.alert_type === 'info'
                  }" class="p-1.5 rounded-full">
                        <mat-icon class="scale-75 text-[18px] w-[18px] h-[18px] leading-[18px]">
                            {{ alert.alert_type === 'critical' ? 'warning' : 'info' }}
                        </mat-icon>
                    </div>

                    <!-- Content -->
                    <div class="flex flex-col flex-1 min-w-0">
                        <div class="flex justify-between items-start mb-0.5">
                            <span class="text-xs font-bold truncate text-slate-700 dark:text-slate-100"
                                [class.font-extrabold]="!alert.is_viewed">
                                {{ alert.patient?.full_name || 'Paciente' }}
                            </span>
                            <span class="text-[10px] text-slate-400 dark:text-slate-500 whitespace-nowrap ml-2">
                                {{ alert.created_at | date:'shortTime' }}
                            </span>
                        </div>
                        <p
                            class="text-[11px] text-slate-500 dark:text-slate-400 leading-tight line-clamp-2 text-wrap whitespace-normal">
                            {{ alert.message }}
                        </p>
                    </div>

                    <!-- Unread Dot -->
                    <div *ngIf="!alert.is_viewed"
                        class="w-2 h-2 rounded-full bg-blue-500 absolute right-2 top-1/2 -translate-y-1/2"></div>
                </div>
            </button>

            <!-- Empty State -->
            <div *ngIf="(notifications$ | async)?.length === 0" class="py-8 text-center">
                <mat-icon class="text-gray-300 scale-150 mb-2">notifications_off</mat-icon>
                <p class="text-xs text-gray-400">Sin notificaciones nuevas</p>
            </div>
        </div>
    </mat-menu>
