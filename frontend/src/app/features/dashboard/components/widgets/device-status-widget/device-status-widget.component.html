<div
    class="h-full flex flex-col p-4 bg-white rounded-3xl border border-slate-100 shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:shadow-[0_8px_30px_rgb(0,0,0,0.1)] relative overflow-hidden group hover:-translate-y-1 transition-all duration-300">
    <!-- Header -->
    <div class="flex justify-between items-start mb-2 relative z-10">
        <div>
            <h3 class="font-extrabold text-slate-800 text-sm leading-none flex items-center gap-1.5">
                <mat-icon class="scale-75 text-slate-400">sensors</mat-icon> IoT Hub
            </h3>
            <p
                class="text-[10px] text-emerald-500 font-bold flex items-center gap-1.5 mt-1 bg-emerald-50 px-2 py-0.5 rounded-full w-fit border border-emerald-100">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> CONECTADO
            </p>
        </div>
        <button mat-icon-button class="text-slate-300 hover:text-slate-500 scale-75 -mt-2 -mr-2">
            <mat-icon>settings</mat-icon>
        </button>
    </div>

    <!-- Device Visualization (Center) -->
    <div class="flex-1 flex flex-col items-center justify-center relative z-10 py-1">
        <!-- Device Circle -->
        <div
            class="w-24 h-24 rounded-full bg-gradient-to-b from-slate-50 to-slate-100 border border-slate-200 shadow-inner flex items-center justify-center relative mb-3 group/device">

            <!-- Pulse Ring (Behind) -->
            <div
                class="absolute inset-0 rounded-full border-2 border-brand-cyan opacity-0 scale-100 group-hover/device:animate-ping-slow">
            </div>

            <!-- Icon -->
            <mat-icon
                class="text-4xl text-slate-600 drop-shadow-sm scale-125 group-hover/device:text-brand-cyan transition-colors duration-300 font-variation-settings-light">watch</mat-icon>

            <!-- Battery Badge -->
            <div class="absolute -bottom-1 -right-1 bg-white p-1 rounded-full shadow-md border border-slate-100 flex items-center justify-center w-8 h-8"
                matTooltip="Batería: 85%" matTooltipPosition="right">
                <div class="relative w-full h-full flex items-center justify-center text-emerald-500">
                    <mat-icon class="icon-small scale-75">battery_full</mat-icon>
                    <span
                        class="absolute text-[8px] font-bold text-slate-600 -top-2 right-4 bg-white px-0.5 rounded shadow-sm border border-slate-50 opacity-0 group-hover/device:opacity-100 transition-opacity">85%</span>
                </div>
            </div>

            <!-- Status Dot (Top Left) -->
            <div class="absolute top-0 left-0 w-3 h-3 bg-blue-500 rounded-full border-2 border-white shadow-sm"></div>
        </div>

        <h4 class="font-bold text-slate-800 text-sm">Smart Inhaler v2</h4>
        <p class="text-[10px] text-slate-400 font-mono tracking-wider">ID: #DEV-8832</p>
    </div>

    <!-- Sync Status Footer -->
    <div class="mt-auto grid grid-cols-2 gap-2 relative z-10 pt-2 border-t border-slate-50">
        <div class="bg-indigo-50/50 rounded-xl p-2 flex flex-col items-center justify-center border border-indigo-50">
            <span class="text-[9px] text-indigo-400 font-bold uppercase">Última Sync</span>
            <span class="font-bold text-indigo-900 text-xs">Hace 2m</span>
        </div>
        <button mat-ripple
            class="bg-slate-50 hover:bg-slate-100 text-slate-600 rounded-xl border border-slate-200 flex flex-col items-center justify-center transition-colors group/sync">
            <mat-icon
                class="icon-small text-slate-400 mb-0.5 group-hover/sync:rotate-180 transition-transform duration-500">sync</mat-icon>
            <span class="text-[9px] font-bold">FORZAR</span>
        </button>
    </div>

    <!-- Background Decor -->
    <div class="absolute -top-10 -right-10 w-40 h-40 bg-indigo-50 rounded-full blur-3xl opacity-40 pointer-events-none">
    </div>
</div>
