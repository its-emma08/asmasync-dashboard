<div
    class="h-full flex flex-col p-4 bg-transparent relative overflow-hidden group transition-all duration-300">
    <!-- Header -->
    <div class="flex justify-between items-center mb-4 z-10 relative">
        <div class="flex items-center gap-3">
            <div
                class="w-10 h-10 rounded-full bg-rose-50 dark:bg-rose-500/10 text-rose-500 flex items-center justify-center shadow-sm border border-rose-100 dark:border-rose-500/20">
                <mat-icon class="scale-90">cake</mat-icon>
            </div>
            <div>
                <h3 class="font-extrabold text-slate-800 dark:text-white text-sm leading-none">Cumpleaños</h3>
                <p class="text-[10px] text-slate-400 dark:text-slate-500 font-bold uppercase tracking-wider mt-1">Próximos 7 días</p>
            </div>
        </div>
        <div class="bg-rose-100/50 dark:bg-rose-500/20 text-rose-600 dark:text-rose-400 px-2 py-0.5 rounded-full text-[10px] font-bold border border-rose-100 dark:border-rose-500/30">
            {{ (upcomingBirthdays$ | async)?.length || 0 }} Eventos
        </div>
    </div>

    <!-- List -->
    <div class="flex-1 overflow-y-auto pr-1 custom-scrollbar z-10 relative space-y-2">

        <!-- Empty State -->
        <div *ngIf="(upcomingBirthdays$ | async)?.length === 0"
            class="flex flex-col items-center justify-center h-full text-slate-400 min-h-[100px]">
            <mat-icon class="text-slate-200 dark:text-slate-700 text-4xl mb-2">event_busy</mat-icon>
            <p class="text-[10px] uppercase font-bold tracking-wide text-slate-300 dark:text-slate-600">Sin cumpleaños cerca</p>
        </div>

        <!-- Birthday Item -->
        <div *ngFor="let p of upcomingBirthdays$ | async"
            class="group/item flex items-center gap-3 p-2.5 rounded-2xl border border-slate-100 dark:border-slate-700 bg-white dark:bg-slate-700/40 hover:border-rose-200 dark:hover:border-rose-500/30 hover:bg-rose-50/30 dark:hover:bg-rose-950/20 transition-all cursor-pointer relative overflow-hidden">

            <!-- Date Badge -->
            <div
                class="w-10 h-10 rounded-xl bg-gradient-to-br from-rose-400 to-pink-500 text-white flex flex-col items-center justify-center shadow-md shadow-rose-200 dark:shadow-none">
                <span class="text-[8px] font-bold uppercase leading-none opacity-90">{{ getMonthName(p.date_of_birth)
                    }}</span>
                <span class="text-lg font-black leading-none">{{ getDay(p.date_of_birth) }}</span>
            </div>

            <!-- Info -->
            <div class="flex-1 min-w-0">
                <p class="text-sm font-bold text-slate-700 dark:text-slate-200 truncate group-hover/item:text-rose-600 dark:group-hover/item:text-rose-400 transition-colors">{{
                    p.full_name }}</p>
                <p class="text-[10px] text-slate-500 dark:text-slate-400 font-medium">Cumple {{ getAge(p.date_of_birth) + 1 }} años</p>
            </div>

            <!-- Quick Action: Send Wish -->
            <button mat-icon-button (click)="$event.stopPropagation(); sendWish(p)"
                class="w-8 h-8 flex items-center justify-center text-slate-300 dark:text-slate-500 hover:text-rose-500 hover:bg-rose-100 dark:hover:bg-rose-950/40 rounded-full transition-all"
                matTooltip="Enviar Felicitación">
                <mat-icon class="scale-75">campaign</mat-icon>
            </button>
        </div>
    </div>

    <!-- Background Decor -->
    <div
        class="absolute -bottom-6 -right-6 w-32 h-32 bg-gradient-to-tl from-rose-100 dark:from-rose-950/10 to-transparent rounded-full blur-3xl opacity-40 pointer-events-none">
    </div>
</div>
