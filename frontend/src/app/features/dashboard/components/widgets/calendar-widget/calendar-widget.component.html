<div class="h-full flex flex-col bg-white dark:bg-slate-800/80 rounded-3xl overflow-hidden">

    <!-- Header -->
    <div
        class="flex justify-between items-center px-5 pt-4 pb-3 border-b border-slate-100 dark:border-slate-700/50 flex-shrink-0">
        <div class="flex items-center gap-2.5">
            <div class="w-9 h-9 rounded-xl bg-indigo-50 dark:bg-indigo-500/10 flex items-center justify-center">
                <mat-icon class="text-indigo-600 dark:text-indigo-400 !text-lg">calendar_month</mat-icon>
            </div>
            <div>
                <h3 class="font-bold text-slate-800 dark:text-white text-sm leading-tight">Agenda</h3>
                <p class="text-[10px] text-slate-400 font-medium">Próximas citas</p>
            </div>
        </div>
        <button mat-icon-button class="!text-indigo-500 !w-8 !h-8" title="Nueva cita">
            <mat-icon class="!text-base">add</mat-icon>
        </button>
    </div>

    <!-- Today highlight strip -->
    <div *ngIf="appointments$ | async as appointments" class="flex-1 flex flex-col overflow-hidden">

        <!-- Empty State -->
        <div *ngIf="appointments.length === 0"
            class="flex-1 flex flex-col items-center justify-center text-slate-400 gap-3 p-6">
            <div class="w-14 h-14 rounded-2xl bg-indigo-50 dark:bg-indigo-500/10 flex items-center justify-center">
                <mat-icon class="text-indigo-400 !text-2xl">event_available</mat-icon>
            </div>
            <div class="text-center">
                <p class="text-sm font-semibold text-slate-500 dark:text-slate-400">Sin citas programadas</p>
                <p class="text-xs text-slate-400 mt-1">Agrega citas con el botón +</p>
            </div>
        </div>

        <!-- Appointment list -->
        <div class="flex-1 overflow-y-auto space-y-2 p-4 scrollbar-hide">
            <div *ngFor="let apt of appointments; let i = index"
                class="group flex items-center gap-3 p-3 rounded-2xl transition-all duration-200 cursor-pointer"
                [class]="i === 0
                    ? 'bg-indigo-50 dark:bg-indigo-500/10 border border-indigo-100 dark:border-indigo-500/20 hover:border-indigo-300'
                    : 'bg-slate-50 dark:bg-slate-700/40 border border-slate-100 dark:border-slate-700 hover:bg-white dark:hover:bg-slate-700 hover:border-slate-200'">

                <!-- Date badge -->
                <div class="flex flex-col items-center justify-center w-11 h-11 rounded-xl flex-shrink-0 transition-colors"
                    [class]="i === 0
                        ? 'bg-indigo-500 text-white shadow-lg shadow-indigo-200 dark:shadow-indigo-900'
                        : 'bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-slate-600 dark:text-slate-300 group-hover:border-indigo-200 group-hover:text-indigo-600'">
                    <span class="text-[9px] font-bold uppercase leading-none"
                        [class]="i === 0 ? 'text-indigo-200' : 'text-slate-400 group-hover:text-indigo-400'">{{
                        apt.month }}</span>
                    <span class="text-lg font-black leading-none">{{ apt.day }}</span>
                </div>

                <!-- Content -->
                <div class="flex-1 min-w-0">
                    <h4 class="text-sm font-bold truncate transition-colors"
                        [class]="i === 0 ? 'text-indigo-700 dark:text-indigo-300' : 'text-slate-700 dark:text-slate-200 group-hover:text-indigo-600'">
                        {{ apt.title }}
                    </h4>
                    <div class="flex items-center gap-1.5 mt-0.5">
                        <mat-icon class="!text-xs !w-3 !h-3"
                            [class]="i === 0 ? 'text-indigo-400' : 'text-slate-400'">schedule</mat-icon>
                        <span class="text-[11px] font-medium"
                            [class]="i === 0 ? 'text-indigo-500 dark:text-indigo-400' : 'text-slate-400'">{{ apt.time
                            }}</span>
                        <!-- "Hoy" badge for first -->
                        <span *ngIf="i === 0"
                            class="ml-1 text-[9px] font-black uppercase bg-indigo-500 text-white px-1.5 py-0.5 rounded-full">HOY</span>
                    </div>
                </div>

                <!-- Arrow indicator -->
                <mat-icon class="!text-sm !w-4 !h-4 flex-shrink-0 opacity-0 group-hover:opacity-100 transition-opacity"
                    [class]="i === 0 ? 'text-indigo-400' : 'text-slate-400'">chevron_right</mat-icon>
            </div>
        </div>

        <!-- Footer CTA -->
        <div class="px-4 pb-4 flex-shrink-0">
            <a routerLink="/dashboard/calendar"
                class="flex items-center justify-center gap-2 w-full py-2.5 rounded-xl border border-indigo-100 dark:border-indigo-500/20 text-indigo-600 dark:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-500/10 transition-colors text-[11px] font-bold">
                <mat-icon class="!text-sm !w-4 !h-4">open_in_full</mat-icon>
                Ver Calendario Completo
            </a>
        </div>
    </div>
</div>
