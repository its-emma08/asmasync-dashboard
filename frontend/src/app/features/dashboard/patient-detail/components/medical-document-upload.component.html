<div class="upload-wrapper">
    <div class="drop-zone" 
         [class.dragging]="isDragging()"
         (dragover)="onDragOver($event)"
         (dragleave)="onDragLeave($event)"
         (drop)="onDrop($event)"
         (click)="fileInput.click()">
        
        <input type="file" #fileInput hidden (change)="onFileSelected($event)" accept=".pdf,image/*">
        
        <div class="zone-content" *ngIf="!selectedFile()">
            <mat-icon class="upload-icon">cloud_upload</mat-icon>
            <h3>Arrastra o haz clic para subir</h3>
            <p>PDF, JPG o PNG (máx. 10MB)</p>
        </div>

        <div class="file-preview" *ngIf="selectedFile()">
            <div class="preview-container">
                <img *ngIf="previewUrl()" [src]="previewUrl()" alt="Vista previa">
                <mat-icon *ngIf="!previewUrl() && selectedFile()?.type === 'application/pdf'" class="pdf-icon">picture_as_pdf</mat-icon>
            </div>
            <div class="file-info">
                <span class="file-name">{{ selectedFile()?.name }}</span>
                <span class="file-size">{{ (selectedFile()?.size || 0) / 1024 / 1024 | number:'1.1-2' }} MB</span>
            </div>
            <button mat-icon-button color="warn" class="remove-btn" (click)="$event.stopPropagation(); removeFile()">
                <mat-icon>cancel</mat-icon>
            </button>
        </div>
    </div>

    <div class="progress-bar" *ngIf="isUploading()">
        <mat-progress-bar mode="indeterminate"></mat-progress-bar>
        <span class="status-text">Subiendo documento médico...</span>
    </div>

    <div class="upload-actions" *ngIf="selectedFile()">
        <button mat-flat-button color="primary" class="full-width" (click)="uploadFile()" [disabled]="isUploading()">
            <mat-icon *ngIf="!isUploading()">publish</mat-icon>
            <mat-icon *ngIf="isUploading()" class="spin">sync</mat-icon>
            {{ isUploading() ? 'Subiendo...' : 'Subir a Expediente' }}
        </button>
    </div>
</div>
