<div class="flex h-screen overflow-hidden relative main-layout-container">

    <!-- Mobile Backdrop -->
    <div *ngIf="isMobile && (sidebarOpen$ | async)"
        class="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 transition-opacity" (click)="closeSidebar()">
    </div>

    <!-- Mobile Sidebar (Slide Over) -->
    <aside *ngIf="isMobile"
        class="fixed inset-y-0 left-0 shadow-2xl z-50 transform transition-transform duration-300 ease-in-out"
        [style.width]="sidebarCollapsed ? '72px' : '260px'" [class.translate-x-0]="sidebarOpen$ | async"
        [class.-translate-x-full]="!(sidebarOpen$ | async)">
        <div class="h-full overflow-y-auto">
            <app-sidebar (collapsedChange)="onSidebarCollapsedChange($event)"></app-sidebar>
        </div>
    </aside>

    <!-- Desktop Sidebar -->
    <aside *ngIf="!isMobile" class="flex-shrink-0 h-full z-20 transition-all duration-300 ease-in-out"
        [style.width]="sidebarCollapsed ? '72px' : '260px'">
        <app-sidebar (collapsedChange)="onSidebarCollapsedChange($event)"></app-sidebar>
    </aside>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col h-full relative overflow-hidden w-full layout-content">
        <!-- Header -->
        <div class="px-6 pt-4 flex-shrink-0">
            <app-dashboard-header></app-dashboard-header>
        </div>

        <!-- Page Content -->
        <main class="flex-1 overflow-y-auto relative w-full page-container" id="main-content">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
