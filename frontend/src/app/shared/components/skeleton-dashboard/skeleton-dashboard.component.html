<div class="fixed inset-0 z-[9999] flex bg-[#F5F5F7] dark:bg-[#1D1D1F]">
  <aside class="w-64 border-r border-white/10 bg-white/40 backdrop-blur-xl hidden md:flex flex-col p-6 space-y-8">
    <div class="h-8 w-32 bg-gray-300/30 rounded-lg shimmer"></div>
    <div class="space-y-4">
      <div *ngFor="let i of [1,2,3,4,5]" class="h-6 w-full bg-gray-300/20 rounded-md shimmer"></div>
    </div>
  </aside>

  <main class="flex-1 flex flex-col">
    <header class="h-16 border-b border-white/10 bg-white/20 backdrop-blur-md flex items-center justify-between px-8">
      <div class="h-8 w-64 bg-gray-300/20 rounded-full shimmer"></div>
      <div class="h-10 w-10 bg-gray-300/30 rounded-full shimmer"></div>
    </header>

    <div class="p-8 grid grid-cols-1 md:grid-cols-3 gap-6">
      <div *ngFor="let i of [1,2,3]" 
           class="glass-card-premium h-40 p-6 flex flex-col justify-between overflow-hidden relative">
        <div class="h-4 w-24 bg-gray-400/20 rounded shimmer"></div>
        <div class="h-10 w-16 bg-gray-400/30 rounded shimmer"></div>
      </div>
      
      <div class="col-span-full glass-card-premium h-64 p-6 overflow-hidden relative">
        <div class="h-6 w-48 bg-gray-400/20 rounded mb-4 shimmer"></div>
        <div class="space-y-3">
          <div class="h-4 w-full bg-gray-400/10 rounded shimmer"></div>
          <div class="h-4 w-5/6 bg-gray-400/10 rounded shimmer"></div>
          <div class="h-4 w-4/6 bg-gray-400/10 rounded shimmer"></div>
        </div>
      </div>
    </div>
  </main>
</div>
