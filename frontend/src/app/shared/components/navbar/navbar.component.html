<mat-toolbar class="navbar-toolbar">
    <!-- Removed Old Menu Button as requested -->

    <!-- 2. Logo & Title -->
    <span class="navbar-title">AsmaSync Dashboard</span>

    <!-- 3. Spacer -->
    <span class="spacer"></span>

    <!-- 4. Notification Badge -->
    <button mat-icon-button class="notification-btn" (click)="navigateToAlerts()">
        <mat-icon [matBadge]="alertCount" [matBadgeHidden]="alertCount === 0" matBadgeColor="warn" matBadgeSize="small">
            notifications
        </mat-icon>
    </button>

    <!-- 5. User Menu -->
    <button mat-button [matMenuTriggerFor]="userMenu" class="user-menu-btn">
        <mat-icon class="avatar-icon">account_circle</mat-icon>
        <span class="username">{{ userName }}</span>
        <mat-icon>arrow_drop_down</mat-icon>
    </button>

    <mat-menu #userMenu="matMenu">
        <button mat-menu-item (click)="navigateToProfile()">
            <mat-icon>person</mat-icon>
            <span>Mi Perfil</span>
        </button>
        <button mat-menu-item (click)="navigateToSettings()">
            <mat-icon>settings</mat-icon>
            <span>Configuración</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()" class="logout-item">
            <mat-icon color="warn">exit_to_app</mat-icon>
            <span class="text-red-500">Cerrar Sesión</span>
        </button>
    </mat-menu>
</mat-toolbar>
