<mat-toolbar color="primary" class="navbar-toolbar">
    <button mat-icon-button (click)="onToggleSidebar()" class="menu-button">
        <mat-icon>menu</mat-icon>
    </button>

    <span class="logo-text">AsmaSync Dashboard</span>

    <span class="spacer"></span>

    <button mat-icon-button class="alert-button" [matMenuTriggerFor]="alertMenu">
        <!-- El badge se oculta si el count es 0 usando [matBadgeHidden] o *ngIf en el content del badge -->
        <mat-icon [matBadge]="(unreadAlerts$ | async) || 0" matBadgeColor="warn"
            [matBadgeHidden]="(unreadAlerts$ | async) === 0">
            notifications
        </mat-icon>
    </button>

    <mat-menu #alertMenu="matMenu">
        <button mat-menu-item (click)="goToAlerts()">
            <mat-icon>list</mat-icon>
            <span>Ver todas las alertas</span>
        </button>
        <button mat-menu-item (click)="markAllAsRead()">
            <mat-icon>done_all</mat-icon>
            <span>Marcar todas como vistas</span>
        </button>
    </mat-menu>

    <div *ngIf="currentUser$ | async as user" class="user-profile">
        <button mat-button [matMenuTriggerFor]="userMenu" class="user-button">
            <mat-icon>account_circle</mat-icon>
            <span class="sm-hidden">{{ user.name }}</span>
            <mat-icon>arrow_drop_down</mat-icon>
        </button>
    </div>

    <mat-menu #userMenu="matMenu">
        <button mat-menu-item>
            <mat-icon>person</mat-icon>
            <span>Perfil</span>
        </button>
        <button mat-menu-item>
            <mat-icon>settings</mat-icon>
            <span>Configuración</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="onLogout()">
            <mat-icon>exit_to_app</mat-icon>
            <span>Cerrar Sesión</span>
        </button>
    </mat-menu>
</mat-toolbar>
