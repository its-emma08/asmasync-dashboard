<div class="p-8 text-center flex flex-col items-center justify-center">

    <!-- Animated Check Circle -->
    <div class="success-checkmark mb-6">
        <div class="check-icon">
            <span class="icon-line line-tip"></span>
            <span class="icon-line line-long"></span>
            <div class="icon-circle"></div>
            <div class="icon-fix"></div>
        </div>
    </div>

    <h2 class="text-2xl font-bold text-brand-dark mb-2">{{ data.title }}</h2>
    <p class="text-gray-500 mb-8">{{ data.message }}</p>

    <button mat-flat-button color="primary" class="w-full h-12 text-lg rounded-xl" (click)="close()">
        {{ data.buttonText || 'Aceptar' }}
    </button>
</div>
