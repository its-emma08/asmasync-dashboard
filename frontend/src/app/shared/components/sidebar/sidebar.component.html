<div class="sidebar-wrapper" [class.is-collapsed]="isCollapsed" [style.width]="isCollapsed ? '72px' : '260px'">

    <!-- ─── Logo Block ─── -->
    <div class="logo-block">
        <div class="logo-icon">
            <img src="assets/logo-lung.png" alt="AsmaSync" class="logo-img"
                onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
            <mat-icon
                style="display:none; color:white; font-size:20px; width:20px; height:20px; justify-content:center; align-items:center;">lungs</mat-icon>
        </div>
        <div class="logo-text" [class.hidden]="isCollapsed">
            <span class="logo-name">AsmaSync</span>
            <span class="logo-tagline">Medical Dashboard</span>
        </div>
        <button class="collapse-btn" [class.is-collapsed]="isCollapsed" (click)="toggleCollapse()"
            [matTooltip]="isCollapsed ? 'Expandir menú' : 'Contraer menú'" matTooltipPosition="right">
            <mat-icon>chevron_left</mat-icon>
        </button>
    </div>

    <!-- ─── Main Navigation ─── -->
    <div class="nav-section">
        <span class="nav-section-label" [class.hidden]="isCollapsed">MENÚ PRINCIPAL</span>

        <ng-container *ngFor="let item of navItems">
            <a [routerLink]="item.route" [routerLinkActiveOptions]="item.exact ? {exact: true} : {exact: false}"
                routerLinkActive="active" class="nav-item" [matTooltip]="isCollapsed ? item.label : ''"
                matTooltipPosition="right">
                <mat-icon>{{ item.icon }}</mat-icon>
                <span>{{ item.label }}</span>
                <ng-container *ngIf="item.badge && (unreadAlerts$ | async) as count">
                    <span *ngIf="count > 0" class="nav-badge">{{ count > 99 ? '99+' : count }}</span>
                </ng-container>
            </a>
        </ng-container>
    </div>

    <!-- ─── Footer Navigation ─── -->
    <div class="sidebar-footer">
        <span class="nav-section-label" [class.hidden]="isCollapsed"
            style="padding-top: 0; padding-bottom: 6px;">SISTEMA</span>
        <ng-container *ngFor="let item of footerItems">
            <a [routerLink]="item.route" routerLinkActive="active" class="nav-item"
                [matTooltip]="isCollapsed ? item.label : ''" matTooltipPosition="right">
                <mat-icon>{{ item.icon }}</mat-icon>
                <span>{{ item.label }}</span>
            </a>
        </ng-container>
    </div>

</div>
