<div class="bg-white rounded-3xl p-4 flex items-center shadow-soft relative overflow-hidden h-full">
    <!-- Icon Circle -->
    <div [class]="'h-12 w-12 rounded-full flex items-center justify-center mr-4 z-10 ' + iconBgClass">
        <mat-icon [class]="iconColorClass">{{ icon }}</mat-icon>
    </div>

    <!-- Content -->
    <div class="z-10">
        <div class="text-sm text-gray-500 font-medium">{{ title }}</div>
        <div class="text-2xl font-bold text-[#2B3674]">{{ value }}</div>
    </div>

    <!-- Sparkline (Decorative based on variant) -->
    <div class="absolute right-0 bottom-0 w-24 h-12 opacity-50 pointer-events-none">
        <!-- Blue Variant -->
        <svg *ngIf="variant === 'blue'" viewBox="0 0 100 50" class="w-full h-full text-brand-cyan" fill="none"
            xmlns="http://www.w3.org/2000/svg">
            <path d="M0 25 C30 25 30 10 50 10 C70 10 70 40 100 40" stroke="currentColor" stroke-width="3" fill="none" />
        </svg>
        <!-- Red Variant -->
        <svg *ngIf="variant === 'red'" viewBox="0 0 100 50" class="w-full h-full text-brand-coral" fill="none"
            xmlns="http://www.w3.org/2000/svg">
            <path d="M0 40 C30 40 30 15 50 15 C70 15 70 35 100 35" stroke="currentColor" stroke-width="3" fill="none" />
        </svg>
        <!-- Green Variant -->
        <svg *ngIf="variant === 'green'" viewBox="0 0 100 50" class="w-full h-full text-brand-green" fill="none"
            xmlns="http://www.w3.org/2000/svg">
            <path d="M0 35 C30 35 30 10 50 10 C70 10 70 30 100 20" stroke="currentColor" stroke-width="3" fill="none" />
        </svg>
        <!-- Yellow/Orange Variant -->
        <svg *ngIf="variant === 'yellow' || variant === 'orange'" viewBox="0 0 100 50"
            class="w-full h-full text-[#FFB547]" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 30 C20 30 40 10 60 40 C80 10 100 30" stroke="currentColor" stroke-width="3" fill="none" />
        </svg>
    </div>

    <!-- Trend Badge -->
    <div *ngIf="trendValue"
        [class]="'ml-auto flex items-center text-xs font-bold px-2 py-1 rounded-full z-10 ' + trendColorClass + ' ' + trendBgClass">
        <mat-icon class="text-xs mr-1 h-3 w-3 flex items-center">{{ trendDirection === 'up' ? 'arrow_upward' :
            'arrow_downward' }}</mat-icon>
        {{ trendValue }}
    </div>
</div>
