<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>AsmaSync - Dashboard Médico</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#00B5AD">

  <style>
    .pre-splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FFFFFF;
      flex-direction: column;
    }

    .logo-container {
      position: relative;
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: breathe 3s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.05); opacity: 1; }
    }

    .loader-dot {
      margin-top: 40px;
      width: 4px;
      height: 4px;
      background: #8E8E93;
      border-radius: 50%;
      animation: dot-pulse 1.5s ease-in-out infinite;
    }

    @keyframes dot-pulse {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.5); opacity: 0.6; }
    }
  </style>
</head>

<body style="background:#FFFFFF; margin:0; padding:0;">
  <app-root>
    <div class="pre-splash">
      <div class="logo-container">
        <svg viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg" style="width:60px;height:60px">
           <path d="M 50 28 Q 40 30 36 34" fill="none" stroke="#007AFF" stroke-width="6" stroke-linecap="round"/>
           <path d="M 50 28 Q 60 30 64 34" fill="none" stroke="#007AFF" stroke-width="6" stroke-linecap="round"/>
           <path d="M 36 34 C 30 36 24 40 20 48 C 16 56 14 65 16 74 C 18 82 24 88 32 90 C 46 82 49 58 49 34 Z" fill="#007AFF"/>
           <path d="M 64 34 C 70 36 76 40 80 48 C 84 56 86 65 84 74 C 82 82 76 88 68 90 C 54 82 51 58 51 34 Z" fill="#007AFF"/>
        </svg>
      </div>
      <div class="loader-dot"></div>
    </div>
  </app-root>
</body>

</html>
